<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Perfume Inventory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center vh-100">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card shadow-lg border-0 rounded-4">
                    <div class="card-body p-4 text-center">
                        <h3 class="fw-bold mb-3">🧴 Fragrance Portal</h3>
                        <p class="text-muted mb-4">Sign in to manage stock & margins</p>

                        {% with messages = get_flashed_messages(with_categories=true) %}
                          {% if messages %}
                            {% for category, message in messages %}
                              <div class="alert alert-{{ category }} alert-dismissible fade show text-start" role="alert">
                                {{ message }}
                                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                              </div>
                            {% endfor %}
                          {% endif %}
                        {% endwith %}

                        <form action="/login" method="POST">
                            <div class="form-floating mb-3 text-start">
                                <input type="text" name="username" class="form-control" id="userInput" placeholder="Username" required>
                                <label for="userInput">Username</label>
                            </div>
                            <div class="form-floating mb-3 text-start">
                                <input type="password" name="password" class="form-control" id="passInput" placeholder="Password" required>
                                <label for="passInput">Password</label>
                            </div>
                            <button class="btn btn-dark w-100 py-2 fw-semibold rounded-3" type="submit">Log In</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
